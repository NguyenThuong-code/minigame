spring:
  application:
    name: mini-game

  datasource:
    url: jdbc:postgresql://localhost:5432/minigame
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID}
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - email
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI}

      resource-server:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.springframework.cache: TRACE

keycloak:
  server-url: ${KEYCLOAK_SERVER_URL}
  realm: ${KEYCLOAK_REALM}
  client-id: ${KEYCLOAK_CLIENT_ID}
  client-secret: ${KEYCLOAK_CLIENT_SECRET}
  admin-username: ${KEYCLOAK_ADMIN_USERNAME}
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD}

vnpay:
  tmn-code: ${VNP_TMN_CODE}
  hash-secret: ${VNP_HASH_SECRET}
  pay-url: "https://sandbox.vnpayment.vn/paymentv2/vpcpay.html"
  return-url: "https://delmer-unspattered-merry.ngrok-free.dev/api/payments/vnpay/return"
  ipn-url: "https://delmer-unspattered-merry.ngrok-free.dev/api/payments/vnpay/ipn"
  order-type: "other"
  locale: "vn"
  curr-code: "VND"
  buy-turns-amount: 5
  buy-turns-price-vnd: 10000